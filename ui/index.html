<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Rocket Scanner</title>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --green: #22c55e;
      --red: #ef4444;
      --orange: #f97316;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    .container { max-width: 1100px; margin: 0 auto; }

    header { margin-bottom: 28px; }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .subtitle { color: var(--muted); margin-top: 6px; font-size: 0.95rem; }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: end;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .field { display: flex; flex-direction: column; gap: 4px; }

    label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }

    input, select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.95rem;
      width: 140px;
    }

    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge.live { background: rgba(34, 197, 94, 0.15); color: var(--green); }

    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    th {
      text-align: left;
      padding: 12px 14px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
    }

    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(59, 130, 246, 0.05); }

    .symbol { font-weight: 700; color: var(--accent); }
    .positive { color: var(--green); }
    .negative { color: var(--red); }

    .score-bar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .score-track {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      max-width: 80px;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--accent), var(--orange));
    }

    .empty, .error, .loading {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
    }

    .error { color: var(--red); }

    @media (max-width: 700px) {
      .hide-mobile { display: none; }
      input, select { width: 100%; }
      .controls { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🚀 Market Rocket Scanner</h1>
      <p class="subtitle">Find stocks launching on volume, momentum, and trend strength</p>
    </header>

    <div class="controls">
      <div class="field">
        <label for="minChange">Min % Change</label>
        <input type="number" id="minChange" value="0" step="0.5" min="-50" max="50">
      </div>
      <div class="field">
        <label for="minVol">Min Vol Ratio</label>
        <input type="number" id="minVol" value="1.0" step="0.1" min="0" max="20">
      </div>
      <div class="field">
        <label for="limit">Limit</label>
        <select id="limit">
          <option value="10">10</option>
          <option value="25" selected>25</option>
          <option value="50">50</option>
        </select>
      </div>
      <button id="scanBtn" onclick="runScan()">Scan Now</button>
    </div>

    <div class="status-bar">
      <span id="statusText">Ready</span>
      <span><span class="badge live" id="autoBadge">Auto-refresh: 60s</span></span>
    </div>

    <div class="table-wrap" id="resultsArea">
      <div class="loading">Click "Scan Now" to find rocket stocks…</div>
    </div>
  </div>

  <script>
    let refreshTimer = null;

    function pctClass(val) {
      return val >= 0 ? "positive" : "negative";
    }

    function formatVolume(vol) {
      if (vol >= 1e9) return (vol / 1e9).toFixed(1) + "B";
      if (vol >= 1e6) return (vol / 1e6).toFixed(1) + "M";
      if (vol >= 1e3) return (vol / 1e3).toFixed(1) + "K";
      return vol.toFixed(0);
    }

    function renderTable(rockets) {
      if (!rockets.length) {
        return '<div class="empty">No rockets found with current filters. Try lowering thresholds.</div>';
      }

      const rows = rockets.map((r, i) => `
        <tr>
          <td>${i + 1}</td>
          <td class="symbol">${r.symbol}</td>
          <td>$${r.price.toFixed(2)}</td>
          <td class="${pctClass(r.pct_change)}">${r.pct_change >= 0 ? "+" : ""}${r.pct_change.toFixed(2)}%</td>
          <td class="hide-mobile">${formatVolume(r.volume)}</td>
          <td>${r.volume_ratio.toFixed(1)}x</td>
          <td class="hide-mobile">${r.rsi.toFixed(1)}</td>
          <td class="hide-mobile">${r.trend_score.toFixed(1)}</td>
          <td>
            <div class="score-bar">
              <span>${r.rocket_score.toFixed(1)}</span>
              <div class="score-track"><div class="score-fill" style="width:${r.rocket_score}%"></div></div>
            </div>
          </td>
        </tr>
      `).join("");

      return `
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Symbol</th>
              <th>Price</th>
              <th>Change</th>
              <th class="hide-mobile">Volume</th>
              <th>Vol Ratio</th>
              <th class="hide-mobile">RSI</th>
              <th class="hide-mobile">Trend</th>
              <th>Rocket Score</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    async function runScan() {
      const btn = document.getElementById("scanBtn");
      const area = document.getElementById("resultsArea");
      const status = document.getElementById("statusText");

      const minChange = document.getElementById("minChange").value;
      const minVol = document.getElementById("minVol").value;
      const limit = document.getElementById("limit").value;

      btn.disabled = true;
      area.innerHTML = '<div class="loading">Scanning market…</div>';
      status.textContent = "Scanning…";

      try {
        const url = `/api/rockets?min_change=${minChange}&min_volume_ratio=${minVol}&limit=${limit}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        area.innerHTML = renderTable(data.rockets);
        const now = new Date().toLocaleTimeString();
        status.textContent = `Found ${data.count} rockets · Updated ${now}`;
      } catch (err) {
        area.innerHTML = `<div class="error">Scan failed: ${err.message}. Is the server running?</div>`;
        status.textContent = "Error";
      } finally {
        btn.disabled = false;
      }
    }

    function startAutoRefresh() {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(runScan, 60000);
    }

    runScan();
    startAutoRefresh();
  </script>
</body>
</html>
