<!DOCTYPE html>
<html>
<head>
<title>AI Trading Dashboard</title>
<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
}

button{
padding:10px 20px;
background:#0078ff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

input{
padding:10px;
width:200px;
}

.price{
font-size:40px;
font-weight:bold;
}
</style>
</head>

<body>

<h1>AI Trading Dashboard (Live Price Demo)</h1>

<div class="card">

<h2>📈 Live Market Price</h2>

<p>Symbol:</p>

<input id="symbolInput" value="MSFT">

<button onclick="loadPrice()">
Load Price
</button>

<hr>

<div id="priceArea">
No data loaded.
</div>

</div>

<script>

const API_KEY = "T6J0DEMGDXS410B7";

async function loadPrice() {

const symbol =
document.getElementById("symbolInput")
.value
.trim()
.toUpperCase();

const priceArea =
document.getElementById("priceArea");

priceArea.innerHTML = "Loading...";

try {

const response = await fetch(
`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${API_KEY}`
);

const data = await response.json();

console.log(data);

if (
data["Global Quote"] &&
data["Global Quote"]["05. price"]
) {

const price =
parseFloat(data["Global Quote"]["05. price"]);

priceArea.innerHTML =
`<div class="price">$${price.toFixed(2)}</div>
<div>${symbol}</div>`;

}
else {

priceArea.innerHTML =
`No data found for ${symbol}`;

}

}
catch(err){

console.error(err);

priceArea.innerHTML =
"Error loading market data.";

}

}

</script>

</body>
</html>
